<svg xmlns="http://www.w3.org/2000/svg" width="1380" height="840" viewBox="0 0 1380 840">
  <defs>
    <style>
      .bg { fill: #0c0d12; }
      .room { fill: #1f2430; stroke: #8aa0ff; stroke-width: 3; rx: 14; ry: 14; }
      .hub { fill: #2a2f3d; stroke: #d8c47a; }
      .title { fill: #eef1ff; font: 700 28px Arial, sans-serif; }
      .label { fill: #d8defa; font: 600 20px Arial, sans-serif; }
      .meta { fill: #b8c0e8; font: 500 17px Arial, sans-serif; }
      .edge { stroke: #86d39d; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .edge2 { stroke: #7ec8ff; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .edgeLocked { stroke: #f1b96a; stroke-width: 4; fill: none; stroke-dasharray: 10 8; marker-end: url(#arrow); }
      .edgeText { fill: #dce5ff; font: 600 16px Arial, sans-serif; }
      .legend { fill: #171b24; stroke: #4f5f8f; stroke-width: 2; rx: 10; ry: 10; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#cfe0ff" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1380" height="840" />
  <text class="title" x="40" y="55">The Sunken Choir - Current Room Map</text>
  <text class="meta" x="40" y="88">Implemented slice on main: 7 rooms, 2 bosses, gated progression + loop-back shortcuts</text>

  <!-- Rooms -->
  <rect class="room" x="80" y="220" width="230" height="130" />
  <text class="label" x="132" y="275">Entrance</text>
  <text class="meta" x="110" y="305">Start + Cathedral Key</text>

  <rect class="room hub" x="410" y="220" width="260" height="130" />
  <text class="label" x="512" y="275">Hub</text>
  <text class="meta" x="470" y="305">Bench + junction</text>

  <rect class="room" x="790" y="220" width="230" height="130" />
  <text class="label" x="850" y="275">East arena</text>
  <text class="meta" x="820" y="305">Cantor + Cling pickup</text>

  <rect class="room" x="410" y="500" width="260" height="130" />
  <text class="label" x="500" y="555">Shaft</text>
  <text class="meta" x="456" y="585">Map pickup + drift gate</text>

  <rect class="room hub" x="790" y="500" width="250" height="130" />
  <text class="label" x="836" y="555">Antechamber</text>
  <text class="meta" x="834" y="585">Bench + key gate</text>

  <rect class="room" x="1110" y="500" width="230" height="130" />
  <text class="label" x="1160" y="555">Bellcrown</text>
  <text class="meta" x="1135" y="585">High Cantor boss</text>

  <rect class="room" x="1110" y="680" width="230" height="120" />
  <text class="label" x="1158" y="732">Stillwater</text>
  <text class="meta" x="1150" y="760">Ending room</text>

  <!-- Connections -->
  <path class="edge" d="M310 285 C350 285, 370 285, 410 285" />
  <path class="edge" d="M410 320 C370 320, 350 320, 310 320" />
  <text class="edgeText" x="340" y="266">normal door</text>

  <path class="edgeLocked" d="M670 285 C710 285, 750 285, 790 285" />
  <path class="edge" d="M790 320 C750 320, 710 320, 670 320" />
  <text class="edgeText" x="688" y="263">Hub -> East needs key</text>

  <path class="edge2" d="M540 350 C540 410, 540 450, 540 500" />
  <text class="edgeText" x="560" y="438">Hub -> Shaft needs Cling</text>

  <path class="edge2" d="M460 500 C460 445, 460 402, 460 350" />
  <text class="edgeText" x="186" y="468">Shaft bottom left/center exits -> Hub</text>

  <path class="edgeLocked" d="M670 565 C720 565, 740 565, 790 565" />
  <text class="edgeText" x="662" y="545">Shaft right exit needs Drift</text>

  <path class="edgeLocked" d="M1040 565 C1070 565, 1080 565, 1110 565" />
  <path class="edge" d="M1110 600 C1080 600, 1070 600, 1040 600" />
  <text class="edgeText" x="1038" y="545">Antechamber -> Bellcrown needs Key</text>

  <path class="edgeLocked" d="M1225 630 C1225 652, 1225 662, 1225 680" />
  <path class="edge" d="M1188 680 C1188 662, 1188 652, 1188 630" />
  <text class="edgeText" x="1002" y="668">Bellcrown -> Stillwater needs High Cantor defeat</text>

  <path class="edge2" d="M790 530 C650 130, 360 120, 250 220" />
  <text class="edgeText" x="500" y="145">Antechamber return-lift -> Entrance</text>

  <path class="edgeLocked" d="M1110 520 C880 90, 420 90, 290 220" />
  <text class="edgeText" x="760" y="110">Bellcrown post-boss lift -> Entrance</text>

  <path class="edge" d="M1110 740 C820 830, 430 820, 290 350" />
  <text class="edgeText" x="700" y="824">Stillwater wraparound -> Entrance</text>

  <!-- Legend -->
  <rect class="legend" x="80" y="680" width="460" height="130" />
  <text class="label" x="108" y="715">Legend</text>
  <line x1="108" y1="736" x2="175" y2="736" class="edge" />
  <text class="meta" x="190" y="742">normal connection</text>
  <line x1="108" y1="764" x2="175" y2="764" class="edgeLocked" />
  <text class="meta" x="190" y="770">gated progression</text>
  <line x1="108" y1="792" x2="175" y2="792" class="edge2" />
  <text class="meta" x="190" y="798">vertical route</text>
  <text class="meta" x="352" y="798">Current room count: 7</text>
</svg>
